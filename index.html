<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Au Boubou Burger - Draw & Send 🍔</title>
    <!-- Chargement de la bibliothèque Ably -->
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: sans-serif; }
        
        /* Message d'alerte pour forcer le mode Paysage */
        #landscape-alert {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffcc00; color: #cc0000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; font-weight: bold; font-size: 1.5rem; padding: 20px;
        }
        #landscape-alert span { font-size: 3rem; margin-bottom: 10px; }

        /* Zone de dessin plein écran */
        canvas { display: block; width: 100vw; height: 100vh; background: #ffffff; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Barre d'outils flottante */
        #toolbar {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: rgba(0, 0, 0, 0.85); padding: 8px 15px;
            border-radius: 50px; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .tool {
            background: none; border: none; font-size: 1.4rem; cursor: pointer;
            padding: 5px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .tool:active { transform: scale(1.2); }
        .active-tool { background: rgba(255, 255, 255, 0.3); box-shadow: 0 0 8px white; }
        
        #colorPicker { width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; cursor: pointer; background: none; }
        .btn-clear { background: #cc0000; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Écran de blocage portrait -->
    <div id="landscape-alert">
        <span>🔄🍔</span>
        OUPS ! Tourne ton téléphone en paysage pour dessiner sur le grand tableau du Boubou Burger !
    </div>

    <!-- Barre d'outils -->
    <div id="toolbar">
        <input type="color" id="colorPicker" value="#000000" title="Couleur">
        <button id="tool-pen" class="tool active-tool" title="Stylo">✏️</button>
        <button id="tool-brush" class="tool" title="Pinceau">🖌️</button>
        <button id="tool-eraser" class="tool" title="Gomme">🧽</button>
        <button id="clearBtn" class="btn-clear">Tout Effacer</button>
    </div>

    <!-- Toile de dessin -->
    <canvas id="paintCanvas"></canvas>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const alertScreen = document.getElementById('landscape-alert');
        
        // --- 1. GESTION DU MODE PAYSAGE ---
        function checkOrientation() {
            if (window.innerHeight > window.innerWidth) {
                alertScreen.style.display = 'flex';
            } else {
                alertScreen.style.display = 'none';
                resizeCanvas();
            }
        }
        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', checkOrientation);

        function resizeCanvas() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(canvas, 0, 0);

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(tempCanvas, 0, 0);
            
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
        }

        // --- 2. CONFIGURATION DE ABLY ---
        const ABLY_KEY = "itUP8Q.ykLVMw:TaF2vQ4LRmV8hbGLnRd_R3TAYFbTgviJkzhtyVUMYWU"; 

        // Identifiant unique de l'appareil
        const myId = Math.random().toString(36).substring(2, 9);

        // Connexion instantanée à Ably
        const ably = new Ably.Realtime({ key: ABLY_KEY });
        const channel = ably.channels.get('boubou-draw-sync');

        // --- 3. CONFIGURATION DES OUTILS ---
        let currentTool = 'pen'; 
        let isDrawing = false;
        let lastX = 0, lastY = 0;

        const tools = {
            pen: { width: 4, isEraser: false },
            brush: { width: 15, isEraser: false },
            eraser: { width: 35, isEraser: true }
        };

        const colorPicker = document.getElementById('colorPicker');
        
        function selectTool(toolName, buttonEl) {
            currentTool = toolName;
            document.querySelectorAll('.tool').forEach(b => b.classList.remove('active-tool'));
            if(buttonEl) buttonEl.classList.add('active-tool');
        }

        document.getElementById('tool-pen').addEventListener('click', function() { selectTool('pen', this); });
        document.getElementById('tool-brush').addEventListener('click', function() { selectTool('brush', this); });
        document.getElementById('tool-eraser').addEventListener('click', function() { selectTool('eraser', this); });

        // --- 4. LOGIQUE DE TRACÉ ET TRANSMISSION ---
        function drawLocalAndSend(x1, y1, x2, y2, tool, color) {
            executeDrawLine(x1, y1, x2, y2, tool, color);
            
            // Envoi à Ably
            channel.publish('draw', { myId, x1, y1, x2, y2, tool, color });
        }

        function executeDrawLine(x1, y1, x2, y2, tool, color) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.lineWidth = tools[tool].width;
            ctx.strokeStyle = tools[tool].isEraser ? "#ffffff" : color;
            ctx.stroke();
            ctx.closePath();
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getMousePos(e);
            lastX = pos.x; lastY = pos.y;
        }

        function moveDrawing(e) {
            if (!isDrawing) return;
            e.preventDefault(); 
            const pos = getMousePos(e);
            drawLocalAndSend(lastX, lastY, pos.x, pos.y, currentTool, colorPicker.value);
            lastX = pos.x; lastY = pos.y;
        }

        function stopDrawing() { isDrawing = false; }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', moveDrawing);
        canvas.addEventListener('mouseup', stopDrawing);
        
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', moveDrawing, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);

        // --- 5. RÉCEPTION DES DESSINS EN DIRECT ---
        channel.subscribe('draw', function(message) {
            const data = message.data;
            if (data.myId !== myId) {
                executeDrawLine(data.x1, data.y1, data.x2, data.y2, data.tool, data.color);
            }
        });

        // --- 6. EFFACAGE GÉNÉRAL EN TEMPS RÉEL ---
        const clearBtn = document.getElementById('clearBtn');
        clearBtn.addEventListener('click', () => {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            channel.publish('clear', { myId });
        });

        channel.subscribe('clear', function(message) {
            if (message.data.myId !== myId) {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        });

        // Premier lancement
        checkOrientation();
    </script>
</body>
</html>
